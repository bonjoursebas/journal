<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f7f8f5;
      --text-dark: #141414;
      --text-mid: #535353;
      --text-light: #9a9a9a;
      --text-grey: #878787;
      --text-muted: #4c4c48;
      --accent: #4133a8;
      --white: #ffffff;
      --border: #e5e5e0;
      --radius: 14px;
    }

    body {
      background-color: var(--bg);
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Google Drive bar */
    .drive-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--white);
      border-radius: var(--radius) var(--radius) 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
    }

    .drive-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dark);
      font-weight: 500;
    }

    .drive-bar-left .icon {
      font-size: 16px;
    }

    .drive-connect-btn {
      font-size: 13px;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 4px 12px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
    }

    .drive-connect-btn:hover {
      background: var(--accent);
      color: var(--white);
    }

    /* Status */
    .drive-status {
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      padding: 6px 16px 10px;
      background: var(--white);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* Journal card */
    .journal-card {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 24px 20px 20px;
    }

    /* Navigation date */
    .date-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .date-nav button {
      background: none;
      border: none;
      font-size: 18px;
      color: var(--text-mid);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: background 0.12s;
      font-family: inherit;
      line-height: 1;
    }

    .date-nav button:hover {
      background: var(--bg);
    }

    .date-display {
      text-align: center;
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 20px;
      color: var(--text-dark);
      letter-spacing: -0.3px;
      min-height: 28px;
      flex: 1;
    }

    .date-display.empty {
      min-height: 28px;
    }

    /* Day label */
    .day-label {
      text-align: center;
      font-size: 12px;
      color: var(--text-grey);
      margin-bottom: 16px;
      min-height: 18px;
    }

    /* Entry area */
    .entry-area {
      width: 100%;
      min-height: 140px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }

    .entry-area::placeholder {
      color: var(--text-light);
      font-style: italic;
    }

    .entry-area:focus {
      border-color: var(--accent);
      background: var(--white);
    }

    /* Save notice */
    .save-notice {
      font-size: 14px;
      color: var(--text-dark);
      margin-top: 14px;
      font-weight: 400;
    }

    /* Actions */
    .actions {
      background: var(--white);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 4px 0 8px;
    }

    .action-link {
      display: block;
      text-align: center;
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      padding: 9px 16px;
      transition: background 0.12s;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
    }

    .action-link:hover {
      background: rgba(65, 51, 168, 0.05);
    }

    .action-link.muted {
      color: var(--text-muted);
    }

    .action-link.muted:hover {
      background: rgba(76, 76, 72, 0.06);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 16px;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Google Drive bar -->
    <div class="drive-bar">
      <div class="drive-bar-left">
        <span class="icon">☁️</span>
        <span>Google Drive</span>
      </div>
      <button class="drive-connect-btn">Se connecter</button>
    </div>

    <div class="drive-status">
      Non connecté — connecte-toi pour sauvegarder ton journal.
    </div>

    <!-- Journal card -->
    <div class="journal-card">

      <!-- Date navigation -->
      <div class="date-nav">
        <button aria-label="Jour précédent">←</button>
        <div class="date-display" id="dateDisplay"></div>
        <button aria-label="Jour suivant">→</button>
      </div>

      <div class="day-label" id="dayLabel"></div>

      <!-- Entry textarea -->
      <textarea
        class="entry-area"
        id="entryArea"
        placeholder="Écris ici…"
        rows="6"
      ></textarea>

      <p class="save-notice">Connecte-toi à Google Drive pour enregistrer</p>

    </div>

    <!-- Action links -->
    <div class="actions">
      <button class="action-link">Bilan 7 derniers jours ↗</button>
      <div class="divider"></div>
      <button class="action-link">Bilan global ↗</button>
      <div class="divider"></div>
      <button class="action-link">Bilan états d'âme ↗</button>
      <div class="divider"></div>
      <button class="action-link muted">Mémoriser le journal ↗</button>
    </div>

  </div>

  <script>
    // Display today's date in French
    const dateDisplay = document.getElementById('dateDisplay');
    const dayLabel = document.getElementById('dayLabel');

    let currentDate = new Date();

    function formatDate(date) {
      return date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function formatDay(date) {
      return date.toLocaleDateString('fr-FR', { weekday: 'long' });
    }

    function updateDisplay() {
      dateDisplay.textContent = formatDate(currentDate);
      dayLabel.textContent = formatDay(currentDate).charAt(0).toUpperCase() + formatDay(currentDate).slice(1);
    }

    updateDisplay();

    // Navigation
    document.querySelectorAll('.date-nav button').forEach((btn, i) => {
      btn.addEventListener('click', () => {
        currentDate.setDate(currentDate.getDate() + (i === 0 ? -1 : 1));
        updateDisplay();
      });
    });
  </script>
</body>
</html>
